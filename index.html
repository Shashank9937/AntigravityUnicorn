<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="Unicorn Business Builder — AI Command Centre for founders. Build, validate, and scale your startup from zero to Series A." />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="color-scheme" content="dark light" />

  <!-- Prevent flash of wrong theme -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('unicorn-os-theme');
        if (t === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#f5f5f7');
        }
      } catch (e) { }
    })();
  </script>

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <title>AntigravityUnicorn — AI Command Centre</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
